<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Visit Tracker</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CVT">
<meta name="theme-color" content="#1a1814">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f3ee;
    --surface: #ffffff;
    --surface2: #f0ede6;
    --border: #e0dbd0;
    --text: #1a1814;
    --text-muted: #8a8278;
    --accent: #2d5a3d;
    --accent-light: #e8f0ea;
    --danger: #8b2020;
    --danger-light: #f5e8e8;
    --warning: #7a5500;
    --warning-light: #fdf3dc;
    --info: #1a4060;
    --info-light: #e3eef7;
    --success: #1e4d2b;
    --success-light: #e6f2ea;
    --radius: 6px;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── Layout ── */
  .shell {
    min-height: 100vh;
  }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--text);
    color: #f5f3ee;
    padding: 0;
    display: flex;
    flex-direction: column;
    position: fixed;
    width: 220px;
    height: 100vh;
    overflow-y: auto;
  }

  .sidebar-brand {
    padding: 28px 24px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .sidebar-brand h1 {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #f5f3ee;
    line-height: 1.4;
  }

  .sidebar-brand p {
    font-size: 11px;
    color: rgba(245,243,238,0.4);
    margin-top: 4px;
    font-family: var(--mono);
  }

  .sidebar-nav {
    padding: 16px 12px;
    flex: 1;
  }

  .nav-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(245,243,238,0.3);
    padding: 0 12px;
    margin: 16px 0 6px;
  }

  .nav-label:first-child { margin-top: 0; }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 13px;
    font-weight: 400;
    color: rgba(245,243,238,0.6);
    transition: all 0.15s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    position: relative;
  }

  .nav-item:hover { background: rgba(255,255,255,0.06); color: #f5f3ee; }

  .nav-item.active {
    background: rgba(255,255,255,0.1);
    color: #f5f3ee;
    font-weight: 500;
  }

  .nav-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-ip { background: #6db88a; }
  .dot-ph { background: #6ab0d4; }
  .dot-tbr { background: #d4a96a; }
  .dot-rev { background: #c47eb5; }

  .nav-count {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 10px;
    background: rgba(255,255,255,0.1);
    padding: 1px 6px;
    border-radius: 10px;
    color: rgba(245,243,238,0.5);
  }

  .sidebar-footer {
    padding: 16px 24px;
    border-top: 1px solid rgba(255,255,255,0.08);
    font-family: var(--mono);
    font-size: 10px;
    color: rgba(245,243,238,0.25);
  }

  /* ── Main content ── */
  .main {
    margin-left: 220px;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .topbar-title {
    font-size: 15px;
    font-weight: 600;
    flex: 1;
  }

  .topbar-title span {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 400;
    color: var(--text-muted);
    margin-left: 8px;
  }

  .search-wrap {
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
  }

  .search {
    padding: 8px 12px 8px 32px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: var(--sans);
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
    width: 220px;
    outline: none;
    transition: border-color 0.15s;
  }

  .search:focus { border-color: var(--accent); }

  .filter-select {
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: var(--sans);
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    cursor: pointer;
  }

  .btn-add {
    padding: 8px 16px;
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: var(--radius);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }

  .btn-add:hover { opacity: 0.85; }

  /* ── Stats bar ── */
  .stats-bar {
    display: flex;
    gap: 1px;
    background: var(--border);
  }

  .stat-cell {
    flex: 1;
    background: var(--surface);
    padding: 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .stat-cell:first-child { padding-left: 32px; }
  .stat-cell:last-child { padding-right: 32px; }

  .stat-num {
    font-family: var(--mono);
    font-size: 26px;
    font-weight: 500;
    line-height: 1;
  }

  .stat-lbl {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-family: var(--mono);
  }

  .num-danger { color: var(--danger); }
  .num-warning { color: var(--warning); }
  .num-success { color: var(--success); }
  .num-info { color: var(--info); }

  /* ── Table ── */
  .content { padding: 0; flex: 1; }

  .table-wrap { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead {
    background: var(--surface2);
    position: relative;
    z-index: 1;
  }

  th {
    text-align: left;
    padding: 10px 16px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 500;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  th:first-child { padding-left: 32px; }
  th:last-child { padding-right: 32px; }

  td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }

  td:first-child { padding-left: 32px; }
  td:last-child { padding-right: 32px; }

  tr:not(.has-color):hover td { background: var(--surface2); }

  .td-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    width: 36px;
  }

  .td-name { font-weight: 500; }

  .td-city {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
  }

  .td-date {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
  }

  .td-days {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
  }

  /* ── Badges ── */
  .badge {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 3px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .badge-overdue { background: var(--danger-light); color: var(--danger); }
  .badge-due-soon { background: var(--warning-light); color: var(--warning); }
  .badge-on-track { background: var(--success-light); color: var(--success); }
  .badge-not-visited, .badge-not-scheduled, .badge-not-sent { background: var(--surface2); color: var(--text-muted); }
  .badge-completed, .badge-reviewed { background: var(--success-light); color: var(--success); }
  .badge-pending { background: var(--info-light); color: var(--info); }
  .badge-sent { background: var(--warning-light); color: var(--warning); }

  .edit-btn {
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: none;
    font-family: var(--mono);
    font-size: 10px;
    cursor: pointer;
    color: var(--text-muted);
    transition: all 0.15s;
  }

  .edit-btn:hover { border-color: var(--text-muted); color: var(--text); }

  /* ── Client color — full row tint ── */
  tr.has-color td {
    background-color: color-mix(in srgb, var(--client-color, transparent) 8%, var(--surface));
  }

  tr.has-color:hover td {
    background-color: color-mix(in srgb, var(--client-color, transparent) 16%, var(--surface));
  }

  .client-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 7px;
    flex-shrink: 0;
    vertical-align: middle;
    position: relative;
    top: -1px;
  }

  /* ── Client name popup ── */
  .client-name-wrap {
    position: relative;
    display: inline-block;
  }

  .client-name-btn {
    background: none;
    border: none;
    padding: 0;
    font: inherit;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    text-align: left;
  }

  .client-name-btn:hover { text-decoration: underline; text-decoration-style: dotted; }

  .client-popup {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    z-index: 50;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    padding: 10px 14px;
    white-space: nowrap;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--text-muted);
    min-width: 180px;
    line-height: 1.6;
  }

  .client-popup.open { display: block; }

  .client-popup strong {
    display: block;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }
  .note-inline {
    width: 100%;
    min-width: 160px;
    padding: 5px 7px;
    border: 1px solid transparent;
    border-radius: var(--radius);
    font-family: var(--sans);
    font-size: 12px;
    color: var(--text);
    background: transparent;
    resize: none;
    height: 34px;
    line-height: 1.4;
    transition: border-color 0.15s, background 0.15s, height 0.15s;
    overflow: hidden;
  }

  .note-inline::placeholder { color: var(--border); }

  .note-inline:hover {
    border-color: var(--border);
    background: var(--surface);
  }

  .note-inline:focus {
    border-color: var(--accent);
    background: var(--surface);
    height: 72px;
    overflow: auto;
    outline: none;
  }

  .notes-cell { min-width: 180px; }

  /* ── Notes textarea in modal ── */
  .field textarea {
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: var(--sans);
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    resize: vertical;
    min-height: 80px;
    line-height: 1.5;
  }

  .field textarea:focus { border-color: var(--accent); }

  .empty-state {
    text-align: center;
    padding: 80px 32px;
    color: var(--text-muted);
  }

  .empty-state p { font-family: var(--mono); font-size: 12px; }

  /* ── Modal ── */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,24,20,0.5);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-bg.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: 10px;
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
    border: 1px solid var(--border);
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }

  .modal-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 2;
  }

  .modal-header h3 {
    font-size: 15px;
    font-weight: 600;
  }

  .modal-close {
    width: 28px; height: 28px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 16px;
    line-height: 1;
    transition: all 0.15s;
  }

  .modal-close:hover { border-color: var(--text-muted); color: var(--text); }

  .modal-body { padding: 20px 24px; }

  .modal-section {
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .modal-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

  .section-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .field-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .field { display: flex; flex-direction: column; gap: 4px; }
  .field.full { grid-column: 1 / -1; }

  .field label {
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--mono);
  }

  .field input, .field select {
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: var(--sans);
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  .field input:focus, .field select:focus { border-color: var(--accent); }

  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    position: sticky;
    bottom: 0;
    background: var(--surface);
  }

  .btn-cancel {
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: none;
    font-family: var(--sans);
    font-size: 13px;
    cursor: pointer;
    color: var(--text-muted);
    transition: all 0.15s;
  }

  .btn-cancel:hover { border-color: var(--text-muted); color: var(--text); }

  .btn-save {
    padding: 8px 20px;
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: var(--radius);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .btn-save:hover { opacity: 0.85; }

  @media (max-width: 768px) {
    /* sidebar becomes a horizontal tab bar at the bottom */
    .shell { grid-template-columns: 1fr; }
    .sidebar {
      position: fixed;
      bottom: 0; top: auto;
      width: 100%; height: auto;
      flex-direction: row;
      align-items: center;
      z-index: 200;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding: 0;
    }
    .sidebar-brand { display: none; }
    .sidebar-nav {
      display: flex;
      flex-direction: row;
      flex: 1;
      padding: 0;
      gap: 0;
    }
    .nav-label { display: none; }
    .nav-item {
      flex: 1;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 10px 4px 12px;
      border-radius: 0;
      font-size: 10px;
      text-align: center;
    }
    .nav-count { display: none; }
    .nav-dot { width: 6px; height: 6px; }
    .sidebar-footer { display: none; }

    /* main shifts up, padded at bottom for tab bar */
    .main { margin-left: 0; padding-bottom: 70px; }

    /* topbar */
    .topbar { flex-wrap: wrap; gap: 8px; padding: 12px 16px; }
    .topbar-title { font-size: 14px; width: 100%; }
    .search { width: 100%; }
    .search-wrap { flex: 1; }
    .filter-select { flex: 1; font-size: 13px; }
    .btn-add { font-size: 13px; }

    /* stats */
    .stats-bar { flex-wrap: wrap; }
    .stat-cell { min-width: 50%; flex: 1 1 50%; padding: 12px 16px; }
    .stat-cell:first-child { padding-left: 16px; }
    .stat-cell:last-child { padding-right: 16px; }
    .stat-num { font-size: 20px; }

    /* hide table, show cards */
    .table-wrap table { display: none; }

    /* modal */
    .field-grid { grid-template-columns: 1fr; }
    .modal { max-width: 100%; border-radius: 12px 12px 0 0; }
    .modal-bg { align-items: flex-end; padding: 0; }
  }

  /* ── Client cards (mobile) ── */
  .cards-wrap {
    display: none;
    padding: 12px 16px;
    gap: 10px;
    flex-direction: column;
  }

  @media (max-width: 768px) {
    .cards-wrap { display: flex; }
  }

  .client-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    border-left: 4px solid var(--client-color, var(--border));
  }

  .card-main {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    cursor: pointer;
    gap: 10px;
  }

  .card-left { flex: 1; min-width: 0; }

  .card-name {
    font-weight: 600;
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-due {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .card-right {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .card-chevron {
    color: var(--text-muted);
    font-size: 12px;
    transition: transform 0.2s;
  }

  .client-card.expanded .card-chevron { transform: rotate(180deg); }

  .card-details {
    display: none;
    padding: 0 14px 14px;
    border-top: 1px solid var(--border);
    font-size: 13px;
  }

  .client-card.expanded .card-details { display: block; }

  .card-detail-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }

  .card-detail-row:last-child { border-bottom: none; }

  .card-detail-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    flex-shrink: 0;
  }

  .card-detail-val {
    font-size: 12px;
    text-align: right;
    color: var(--text);
  }

  .card-actions {
    display: flex;
    gap: 8px;
    padding-top: 10px;
    margin-top: 4px;
  }

  .card-edit-btn {
    flex: 1;
    padding: 8px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: none;
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    color: var(--text-muted);
    text-align: center;
  }

  .card-note {
    width: 100%;
    margin-top: 8px;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: var(--sans);
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
    resize: none;
    height: 60px;
    line-height: 1.4;
    outline: none;
  }

  .card-note:focus { border-color: var(--accent); }
</style>

<style>
  .login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: var(--bg);
  }
  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 40px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }
  .login-brand {
    margin-bottom: 28px;
    text-align: center;
  }
  .login-brand h1 {
    font-family: var(--mono);

const TODAY = new Date(); TODAY.setHours(0,0,0,0);

function parseDate(d){
  if(!d) return null;
  if(d instanceof Date) return d;
  const s = String(d).split('T')[0];
  const p = s.split('-').map(Number);
  if(p.length !== 3 || isNaN(p[0])) return null;
  return new Date(p[0], p[1]-1, p[2]);
}
function fmt(d){
  if(!d) return '—';
  const dt = parseDate(d);
  if(!dt) return '—';
  return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function addDays(d,n){
  const r = parseDate(d);
  if(!r) return null;
  r.setDate(r.getDate()+n);
  return r;
}
function daysFrom(d){
  const dt = parseDate(d);
  if(!dt) return null;
  return Math.round((dt-TODAY)/86400000);
}

// ── Status functions ──
function getIPStatus(c){
  if(!c.lastVisit) return {label:'Not yet visited',cls:'not-visited',days:null,nextDue:null};
  const next = addDays(c.lastVisit, 182);
  const d = daysFrom(next);
  if(d<0) return {label:'Overdue',cls:'overdue',days:d,nextDue:next};
  if(d<=30) return {label:'Due soon',cls:'due-soon',days:d,nextDue:next};
  return {label:'On track',cls:'on-track',days:d,nextDue:next};
}
function getPhoneStatus(c){
  const p=phoneData[c.name]||{};
  if(!p.ph1&&!p.ph2) return {label:'Not scheduled',cls:'not-scheduled'};
  if(p.ph1c&&p.ph2c) return {label:'Completed',cls:'completed'};
  if(p.ph1c){
    if(p.ph2){ const d=daysFrom(p.ph2); return d<0?{label:'Visit 2 overdue',cls:'overdue'}:{label:'Visit 2 pending',cls:'pending'}; }
    return {label:'Visit 1 done',cls:'on-track'};
  }
  if(p.ph1){ const d=daysFrom(p.ph1); return d<0?{label:'Visit 1 overdue',cls:'overdue'}:{label:'Visit 1 pending',cls:'pending'}; }
  return {label:'Not scheduled',cls:'not-scheduled'};
}
function getTBRStatus(c){
  const t=tbrData[c.name];
  if(!t||!t.tbr1) return {label:'Not scheduled',cls:'not-scheduled'};
  if(t.twice==='Yes'){
    if(t.tbr1c&&t.tbr2c) return {label:'Completed',cls:'completed'};
    if(t.tbr1c){
      if(t.tbr2){ const d=daysFrom(t.tbr2); return d<0?{label:'Visit 2 overdue',cls:'overdue'}:{label:'Visit 2 pending',cls:'pending'}; }
      return {label:'Visit 1 done',cls:'on-track'};
    }
    const d=daysFrom(t.tbr1); return d<0?{label:'Visit 1 overdue',cls:'overdue'}:{label:'Visit 1 pending',cls:'pending'};
  }
  if(t.tbr1c) return {label:'Completed',cls:'completed'};
  const d=daysFrom(t.tbr1); return d<0?{label:'Overdue',cls:'overdue'}:{label:'Pending',cls:'pending'};
}
function getReviewStatus(c){
  const r=reviewData[c.name];
  if(!r||!r.sent) return {label:'Not sent',cls:'not-sent'};
  if(r.reviewed) return {label:'Reviewed',cls:'reviewed'};
  return {label:'Awaiting review',cls:'sent'};
}

// ── UI helpers ──
function badge(cls,label){ return `<span class="badge badge-${cls}">${label}</span>`; }

function renderNote(name,note){
  const escaped=(note||'').replace(/"/g,'&quot;');
  return `<textarea class="note-inline" placeholder="Add a note…" onblur="saveNote('${name.replace(/'/g,"\'")}',this.value)">${escaped}</textarea>`;
}

function nameCell(c){
  const color=getClientColor(c.name);
  const addr=[c.address,c.city].filter(Boolean).join(', ')||'No address on file';
  return `<span class="client-name-wrap">
    <button class="client-name-btn" onclick="toggleClientPopup(this)">
      <span class="client-dot" style="background:${color}"></span>${c.name}
    </button>
    <div class="client-popup"><strong>${c.name}</strong>${addr}</div>
  </span>`;
}

function toggleClientPopup(el){
  const popup=el.nextElementSibling;
  const isOpen=popup.classList.contains('open');
  document.querySelectorAll('.client-popup.open').forEach(p=>p.classList.remove('open'));
  if(!isOpen) popup.classList.add('open');
}

document.addEventListener('click',function(e){
  if(!e.target.closest('.client-name-wrap'))
    document.querySelectorAll('.client-popup.open').forEach(p=>p.classList.remove('open'));
});

async function saveNote(name,value){
  notesData[name]=value;
  try { await sbUpsert('notes',{name,note:value}); } catch(e){ console.error('Note save failed',e); }
}

      html+=`<tr class="has-color" style="--client-color:${color}"><td class="td-num">${i+1}</td><td class="td-name">${nameCell(c)}</td><td class="td-city">${c.city}</td><td class="td-date">${t.twice||'No'}</td><td class="td-date">${fmt(t.tbr1)}</td><td class="td-date">${fmt(t.tbr1c)}</td><td class="td-date">${fmt(t.tbr2)}</td><td class="td-date">${fmt(t.tbr2c)}</td><td>${badge(st.cls,st.label)}</td><td class="td-edit"><button class="edit-btn" onclick="openEdit(${c.id})">edit</button></td></tr>`;
    });
    html+='</tbody></table>';
  } else {
    html=`<table><thead><tr><th>#</th><th>Client</th><th>City</th><th>Email sent</th><th>Person sent to</th><th>Date reviewed</th><th>Reviewer</th><th>Status</th><th>Notes</th><th class="th-edit"></th></tr></thead><tbody>`;
    rows.forEach((c,i)=>{
      const r=reviewData[c.name]||{};
      const st=getReviewStatus(c);
      const color=getClientColor(c.name);
      html+=`<tr class="has-color" style="--client-color:${color}"><td class="td-num">${i+1}</td><td class="td-name">${nameCell(c)}</td><td class="td-city">${c.city}</td><td class="td-date">${fmt(r.sent)}</td><td>${r.person||'—'}</td><td class="td-date">${fmt(r.reviewed)}</td><td>${r.reviewer||'—'}</td><td>${badge(st.cls,st.label)}</td><td class="notes-cell">${renderNote(c.name,notesData[c.name]||'')}</td><td class="td-edit"><button class="edit-btn" onclick="openEdit(${c.id})">edit</button></td></tr>`;
    });
    html+='</tbody></table>';
  }

  tableWrap.innerHTML=html;
  tableWrap.style.display=isMobile()?'none':'';
  renderCards(rows);
  cardsWrap.style.display=isMobile()?'flex':'none';
}

// ── Supabase ──
const SUPA_URL='https://wugttsxluyryekqwnktt.supabase.co';
const SUPA_KEY='sb_publishable_C3qE0bvbXbk3p4fZnl8Q8g_Vkbr9xGM';

function sbHeaders(){
  const token=sessionStorage.getItem('cvt_token')||SUPA_KEY;
  return {'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+token,'Prefer':'return=minimal'};
}
async function sbGet(table){
  const res=await fetch(SUPA_URL+'/rest/v1/'+table+'?select=*',{headers:sbHeaders()});
  if(!res.ok) throw new Error('sbGet failed: '+table);
  return res.json();
}
async function sbUpsert(table,row){
  await fetch(SUPA_URL+'/rest/v1/'+table,{method:'POST',headers:{...sbHeaders(),'Prefer':'resolution=merge-duplicates,return=minimal'},body:JSON.stringify(row)});
}

function showStatus(msg,ok=true){
  let el=document.getElementById('sync-status');
  if(!el){el=document.createElement('div');el.id='sync-status';el.style='position:fixed;bottom:20px;right:20px;padding:10px 16px;border-radius:6px;font-family:var(--mono);font-size:12px;z-index:999;transition:opacity 0.5s;';document.body.appendChild(el);}
  el.textContent=msg;
  el.style.background=ok?'var(--success-light)':'var(--danger-light)';
  el.style.color=ok?'var(--success)':'var(--danger)';
  el.style.opacity='1';
  setTimeout(()=>{el.style.opacity='0';},3000);
}

async function loadFromSupabase(){
  showStatus('Loading data...',true);
  try {
    const [c,p,t,r]=await Promise.all([sbGet('clients'),sbGet('phone_visits'),sbGet('tbr_visits'),sbGet('review_data')]);
    const n=await sbGet('notes').catch(()=>[]);

    if(c&&c.length>0){
      const localMap={};
      clients.forEach(lc=>localMap[lc.name]=lc);
      clients=c.map(row=>{
        const local=localMap[row.name]||{};
        return {id:row.id,name:row.name,address:row.address||local.address||'',city:row.city||local.city||'',lastVisit:row.last_visit||local.lastVisit||null,lastVisit2:row.last_visit2||local.lastVisit2||null};
      });
      clients.sort((a,b)=>a.name.localeCompare(b.name));
      nextId=Math.max(...clients.map(c=>c.id))+1;
      colorIndex=0;
      clients.forEach(cl=>getClientColor(cl.name));
    }
    if(p&&p.length>0) p.forEach(row=>{phoneData[row.name]={ph1:row.ph1,ph2:row.ph2,ph1c:row.ph1c,ph2c:row.ph2c};});
    if(t&&t.length>0) t.forEach(row=>{tbrData[row.name]={twice:row.twice,tbr1:row.tbr1,tbr1c:row.tbr1c,tbr2:row.tbr2,tbr2c:row.tbr2c};});
    if(r&&r.length>0) r.forEach(row=>{reviewData[row.name]={sent:row.sent,person:row.person,reviewed:row.reviewed,reviewer:row.reviewer};});
    if(n&&n.length>0) n.forEach(row=>{notesData[row.name]=row.note||'';});

    showStatus('Data loaded',true);
  } catch(e){
    console.error(e);
    showStatus('Could not connect to database',false);
  }
  updateFilterOptions();
  render();
}

async function saveClientToSupabase(){
  const name=document.getElementById('f-name').value.trim();
  if(!name) return;
  const clientRow={id:editingId||nextId,name,address:document.getElementById('f-addr').value.trim(),city:document.getElementById('f-city').value.trim()||'Merced',last_visit:document.getElementById('f-last').value||null,last_visit2:document.getElementById('f-last2').value||null};
  const phoneRow={name,ph1:document.getElementById('f-ph1').value||null,ph2:document.getElementById('f-ph2').value||null,ph1c:document.getElementById('f-ph1c').value||null,ph2c:document.getElementById('f-ph2c').value||null};
  const tbrRow={name,twice:document.getElementById('f-tbr-twice').value,tbr1:document.getElementById('f-tbr1').value||null,tbr1c:document.getElementById('f-tbr1c').value||null,tbr2:document.getElementById('f-tbr2').value||null,tbr2c:document.getElementById('f-tbr2c').value||null};
  const reviewRow={name,sent:document.getElementById('f-rev-sent').value||null,person:document.getElementById('f-rev-person').value||null,reviewed:document.getElementById('f-rev-date').value||null,reviewer:document.getElementById('f-rev-reviewer').value||null};
  const note=document.getElementById('f-notes').value.trim();
  try {
    showStatus('Saving...',true);
    await Promise.all([sbUpsert('clients',clientRow),sbUpsert('phone_visits',phoneRow),sbUpsert('tbr_visits',tbrRow),sbUpsert('review_data',reviewRow),sbUpsert('notes',{name,note})]);
    const data={id:clientRow.id,name,address:clientRow.address,city:clientRow.city,lastVisit:clientRow.last_visit,lastVisit2:clientRow.last_visit2};
    phoneData[name]={ph1:phoneRow.ph1,ph2:phoneRow.ph2,ph1c:phoneRow.ph1c,ph2c:phoneRow.ph2c};
    tbrData[name]={twice:tbrRow.twice,tbr1:tbrRow.tbr1,tbr1c:tbrRow.tbr1c,tbr2:tbrRow.tbr2,tbr2c:tbrRow.tbr2c};
    reviewData[name]={sent:reviewRow.sent,person:reviewRow.person,reviewed:reviewRow.reviewed,reviewer:reviewRow.reviewer};
    notesData[name]=note;
    if(editingId){const i=clients.findIndex(c=>c.id===editingId);clients[i]={...clients[i],...data};}
    else{clients.push(data);nextId++;clients.sort((a,b)=>a.name.localeCompare(b.name));}
    closeModal();render();showStatus('Saved!',true);
  } catch(e){console.error(e);showStatus('Save failed',false);}
}

saveClient=saveClientToSupabase;

// ── Auth ──
const SUPA_AUTH=SUPA_URL+'/auth/v1';

async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const password=document.getElementById('login-password').value;
  const errEl=document.getElementById('login-error');
  errEl.style.display='none';
  try {
    const res=await fetch(SUPA_AUTH+'/token?grant_type=password',{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPA_KEY},body:JSON.stringify({email,password})});
    const data=await res.json();
    if(data.access_token){
      sessionStorage.setItem('cvt_token',data.access_token);
      document.getElementById('login-screen').style.display='none';
      document.querySelector('.shell').style.display='';
      loadFromSupabase();
    } else { errEl.style.display='block'; }
  } catch(e){ errEl.style.display='block'; }
}

async function doLogout(){
  const token=sessionStorage.getItem('cvt_token');
  if(token){ await fetch(SUPA_AUTH+'/logout',{method:'POST',headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+token}}).catch(()=>{}); }
  sessionStorage.removeItem('cvt_token');
  sessionStorage.removeItem('cvt_refresh');
  document.getElementById('login-screen').style.display='flex';
  document.querySelector('.shell').style.display='none';
}

(function checkSession(){
  const token=sessionStorage.getItem('cvt_token');
  if(token){
    document.getElementById('login-screen').style.display='none';
    document.querySelector('.shell').style.display='';
    loadFromSupabase();
  }
})();
