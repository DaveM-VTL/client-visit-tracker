<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Visit Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f3ee;
    --surface: #ffffff;
    --surface2: #f0ede6;
    --border: #e0dbd0;
    --text: #1a1814;
    --text-muted: #8a8278;
    --accent: #2d5a3d;
    --accent-light: #e8f0ea;
    --danger: #8b2020;
    --danger-light: #f5e8e8;
    --warning: #7a5500;
    --warning-light: #fdf3dc;
    --info: #1a4060;
    --info-light: #e3eef7;
    --success: #1e4d2b;
    --success-light: #e6f2ea;
    --radius: 6px;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── Layout ── */
  .shell {
    min-height: 100vh;
  }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--text);
    color: #f5f3ee;
    padding: 0;
    display: flex;
    flex-direction: column;
    position: fixed;
    width: 220px;
    height: 100vh;
    overflow-y: auto;
  }

  .sidebar-brand {
    padding: 28px 24px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .sidebar-brand h1 {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #f5f3ee;
    line-height: 1.4;
  }

  .sidebar-brand p {
    font-size: 11px;
    color: rgba(245,243,238,0.4);
    margin-top: 4px;
    font-family: var(--mono);
  }

  .sidebar-nav {
    padding: 16px 12px;
    flex: 1;
  }

  .nav-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(245,243,238,0.3);
    padding: 0 12px;
    margin: 16px 0 6px;
  }

  .nav-label:first-child { margin-top: 0; }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 13px;
    font-weight: 400;
    color: rgba(245,243,238,0.6);
    transition: all 0.15s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    position: relative;
  }

  .nav-item:hover { background: rgba(255,255,255,0.06); color: #f5f3ee; }

  .nav-item.active {
    background: rgba(255,255,255,0.1);
    color: #f5f3ee;
    font-weight: 500;
  }

  .nav-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-ip { background: #6db88a; }
  .dot-ph { background: #6ab0d4; }
  .dot-tbr { background: #d4a96a; }
  .dot-rev { background: #c47eb5; }

  .nav-count {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 10px;
    background: rgba(255,255,255,0.1);
    padding: 1px 6px;
    border-radius: 10px;
    color: rgba(245,243,238,0.5);
  }

  .sidebar-footer {
    padding: 16px 24px;
    border-top: 1px solid rgba(255,255,255,0.08);
    font-family: var(--mono);
    font-size: 10px;
    color: rgba(245,243,238,0.25);
  }

  /* ── Main content ── */
  .main {
    margin-left: 220px;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .topbar-title {
    font-size: 15px;
    font-weight: 600;
    flex: 1;
  }

  .topbar-title span {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 400;
    color: var(--text-muted);
    margin-left: 8px;
  }

  .search-wrap {
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
  }

  .search {
    padding: 8px 12px 8px 32px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: var(--sans);
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
    width: 220px;
    outline: none;
    transition: border-color 0.15s;
  }

  .search:focus { border-color: var(--accent); }

  .filter-select {
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: var(--sans);
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    cursor: pointer;
  }

  .btn-add {
    padding: 8px 16px;
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: var(--radius);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }

  .btn-add:hover { opacity: 0.85; }

  /* ── Stats bar ── */
  .stats-bar {
    display: flex;
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }

  .stat-cell {
    flex: 1;
    background: var(--surface);
    padding: 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .stat-cell:first-child { padding-left: 32px; }
  .stat-cell:last-child { padding-right: 32px; }

  .stat-num {
    font-family: var(--mono);
    font-size: 26px;
    font-weight: 500;
    line-height: 1;
  }

  .stat-lbl {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-family: var(--mono);
  }

  .num-danger { color: var(--danger); }
  .num-warning { color: var(--warning); }
  .num-success { color: var(--success); }
  .num-info { color: var(--info); }

  /* ── Table ── */
  .content { padding: 0; flex: 1; }

  .table-wrap { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead {
    background: var(--surface2);
  }

  th {
    text-align: left;
    padding: 10px 16px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 500;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  th:first-child { padding-left: 32px; }
  th:last-child { padding-right: 32px; }

  td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }

  td:first-child { padding-left: 32px; }
  td:last-child { padding-right: 32px; }

  tr:hover td { background: var(--surface2); }

  .td-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    width: 36px;
  }

  .td-name { font-weight: 500; }

  .td-city {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
  }

  .td-date {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
  }

  .td-days {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
  }

  /* ── Badges ── */
  .badge {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 3px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .badge-overdue { background: var(--danger-light); color: var(--danger); }
  .badge-due-soon { background: var(--warning-light); color: var(--warning); }
  .badge-on-track { background: var(--success-light); color: var(--success); }
  .badge-not-visited, .badge-not-scheduled, .badge-not-sent { background: var(--surface2); color: var(--text-muted); }
  .badge-completed, .badge-reviewed { background: var(--success-light); color: var(--success); }
  .badge-pending { background: var(--info-light); color: var(--info); }
  .badge-sent { background: var(--warning-light); color: var(--warning); }

  .edit-btn {
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: none;
    font-family: var(--mono);
    font-size: 10px;
    cursor: pointer;
    color: var(--text-muted);
    transition: all 0.15s;
  }

  .edit-btn:hover { border-color: var(--text-muted); color: var(--text); }

  .empty-state {
    text-align: center;
    padding: 80px 32px;
    color: var(--text-muted);
  }

  .empty-state p { font-family: var(--mono); font-size: 12px; }

  /* ── Modal ── */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,24,20,0.5);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-bg.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: 10px;
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
    border: 1px solid var(--border);
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }

  .modal-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 2;
  }

  .modal-header h3 {
    font-size: 15px;
    font-weight: 600;
  }

  .modal-close {
    width: 28px; height: 28px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 16px;
    line-height: 1;
    transition: all 0.15s;
  }

  .modal-close:hover { border-color: var(--text-muted); color: var(--text); }

  .modal-body { padding: 20px 24px; }

  .modal-section {
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .modal-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

  .section-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .field-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .field { display: flex; flex-direction: column; gap: 4px; }
  .field.full { grid-column: 1 / -1; }

  .field label {
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--mono);
  }

  .field input, .field select {
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: var(--sans);
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  .field input:focus, .field select:focus { border-color: var(--accent); }

  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    position: sticky;
    bottom: 0;
    background: var(--surface);
  }

  .btn-cancel {
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: none;
    font-family: var(--sans);
    font-size: 13px;
    cursor: pointer;
    color: var(--text-muted);
    transition: all 0.15s;
  }

  .btn-cancel:hover { border-color: var(--text-muted); color: var(--text); }

  .btn-save {
    padding: 8px 20px;
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: var(--radius);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .btn-save:hover { opacity: 0.85; }

  @media (max-width: 768px) {
    .shell { grid-template-columns: 1fr; }
    .sidebar { position: static; width: 100%; height: auto; flex-direction: row; flex-wrap: wrap; }
    .sidebar-brand { border-bottom: none; border-right: 1px solid rgba(255,255,255,0.08); padding: 16px; }
    .sidebar-nav { display: flex; flex-wrap: wrap; gap: 4px; padding: 12px; }
    .nav-label { display: none; }
    .sidebar-footer { display: none; }
    .main { margin-left: 0; }
    .field-grid { grid-template-columns: 1fr; }
    .stats-bar { flex-wrap: wrap; }
    .stat-cell { min-width: 120px; }
    .topbar { flex-wrap: wrap; gap: 10px; }
    .search { width: 100%; }
  }
</style>
</head>
<body>

<div class="shell">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <h1>Client Visit<br>Tracker</h1>
      <p>55 clients</p>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-label">Trackers</div>
      <button class="nav-item active" onclick="switchTab('inperson',this)">
        <span class="nav-dot dot-ip"></span>
        In-person visits
        <span class="nav-count" id="cnt-ip">—</span>
      </button>
      <button class="nav-item" onclick="switchTab('phone',this)">
        <span class="nav-dot dot-ph"></span>
        Phone visits
        <span class="nav-count" id="cnt-ph">—</span>
      </button>
      <button class="nav-item" onclick="switchTab('tbr',this)">
        <span class="nav-dot dot-tbr"></span>
        TBRs
        <span class="nav-count" id="cnt-tbr">—</span>
      </button>
      <button class="nav-item" onclick="switchTab('reviews',this)">
        <span class="nav-dot dot-rev"></span>
        Google reviews
        <span class="nav-count" id="cnt-rev">—</span>
      </button>
    </nav>
    <div class="sidebar-footer">
      Updated today
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbar-title">In-person visits <span>all clients</span></div>
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input class="search" type="text" placeholder="Search clients..." oninput="render()" id="search">
      </div>
      <select class="filter-select" onchange="render()" id="filter"></select>
      <button class="btn-add" onclick="openAdd()">+ Add client</button>
    </div>

    <div class="stats-bar" id="stats-bar"></div>
    <div class="content">
      <div class="table-wrap" id="table-wrap"></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Edit client</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-section">
        <div class="section-label">Client info</div>
        <div class="field-grid">
          <div class="field full"><label>Client name</label><input id="f-name" type="text"></div>
          <div class="field full"><label>Address</label><input id="f-addr" type="text"></div>
          <div class="field"><label>City</label><input id="f-city" type="text"></div>
        </div>
      </div>
      <div class="modal-section">
        <div class="section-label">In-person visits</div>
        <div class="field-grid">
          <div class="field"><label>Last visit</label><input id="f-last" type="date"></div>
          <div class="field"><label>Second visit</label><input id="f-last2" type="date"></div>
        </div>
      </div>
      <div class="modal-section">
        <div class="section-label">Phone visits</div>
        <div class="field-grid">
          <div class="field"><label>Visit 1 scheduled</label><input id="f-ph1" type="date"></div>
          <div class="field"><label>Visit 2 scheduled</label><input id="f-ph2" type="date"></div>
          <div class="field"><label>Visit 1 completed</label><input id="f-ph1c" type="date"></div>
          <div class="field"><label>Visit 2 completed</label><input id="f-ph2c" type="date"></div>
        </div>
      </div>
      <div class="modal-section">
        <div class="section-label">TBRs</div>
        <div class="field-grid">
          <div class="field"><label>Twice per year?</label>
            <select id="f-tbr-twice"><option value="No">No</option><option value="Yes">Yes</option></select>
          </div>
          <div class="field"></div>
          <div class="field"><label>Visit 1 scheduled</label><input id="f-tbr1" type="date"></div>
          <div class="field"><label>Visit 1 completed</label><input id="f-tbr1c" type="date"></div>
          <div class="field"><label>Visit 2 scheduled</label><input id="f-tbr2" type="date"></div>
          <div class="field"><label>Visit 2 completed</label><input id="f-tbr2c" type="date"></div>
        </div>
      </div>
      <div class="modal-section">
        <div class="section-label">Google review</div>
        <div class="field-grid">
          <div class="field"><label>Email sent date</label><input id="f-rev-sent" type="date"></div>
          <div class="field"><label>Person sent to</label><input id="f-rev-person" type="text"></div>
          <div class="field"><label>Date reviewed</label><input id="f-rev-date" type="date"></div>
          <div class="field"><label>Reviewer</label><input id="f-rev-reviewer" type="text"></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveClient()">Save changes</button>
    </div>
  </div>
</div>

let nextId=56, currentTab='inperson', editingId=null;

function getIPStatus(c){
  if(!c.lastVisit)return{label:'Not yet visited',cls:'not-visited',days:null,nextDue:null};
  const next=addDays(new Date(c.lastVisit),182);
  const d=daysFrom(next);
  if(d<0)return{label:'Overdue',cls:'overdue',days:d,nextDue:next};
  if(d<=30)return{label:'Due soon',cls:'due-soon',days:d,nextDue:next};
  return{label:'On track',cls:'on-track',days:d,nextDue:next};
}
function getPhoneStatus(c){
  const p=phoneData[c.name]||{};
  if(!p.ph1&&!p.ph2)return{label:'Not scheduled',cls:'not-scheduled'};
  if(p.ph1c&&p.ph2c)return{label:'Completed',cls:'completed'};
  if(p.ph1c){if(p.ph2){const d=daysFrom(new Date(p.ph2));return d<0?{label:'Visit 2 overdue',cls:'overdue'}:{label:'Visit 2 pending',cls:'pending'};}return{label:'Visit 1 done',cls:'on-track'};}
  if(p.ph1){const d=daysFrom(new Date(p.ph1));return d<0?{label:'Visit 1 overdue',cls:'overdue'}:{label:'Visit 1 pending',cls:'pending'};}
  return{label:'Not scheduled',cls:'not-scheduled'};
}
function getTBRStatus(c){
  const t=tbrData[c.name];
  if(!t||!t.tbr1)return{label:'Not scheduled',cls:'not-scheduled'};
  if(t.twice==='Yes'){
    if(t.tbr1c&&t.tbr2c)return{label:'Completed',cls:'completed'};
    if(t.tbr1c){if(t.tbr2){const d=daysFrom(new Date(t.tbr2));return d<0?{label:'Visit 2 overdue',cls:'overdue'}:{label:'Visit 2 pending',cls:'pending'};}return{label:'Visit 1 done',cls:'on-track'};}
    const d=daysFrom(new Date(t.tbr1));return d<0?{label:'Visit 1 overdue',cls:'overdue'}:{label:'Visit 1 pending',cls:'pending'};
  }
  if(t.tbr1c)return{label:'Completed',cls:'completed'};
  const d=daysFrom(new Date(t.tbr1));return d<0?{label:'Overdue',cls:'overdue'}:{label:'Pending',cls:'pending'};
}
function getReviewStatus(c){
  const r=reviewData[c.name];
  if(!r||!r.sent)return{label:'Not sent',cls:'not-sent'};
  if(r.reviewed)return{label:'Reviewed',cls:'reviewed'};
  return{label:'Awaiting review',cls:'sent'};
}

const filterOptions={
  inperson:['all','overdue','due-soon','on-track','not-visited'],
  phone:['all','overdue','pending','completed','not-scheduled'],
  tbr:['all','overdue','pending','completed','not-scheduled'],
  reviews:['all','reviewed','sent','not-sent'],
};
const filterLabels={all:'All statuses',overdue:'Overdue','due-soon':'Due soon','on-track':'On track','not-visited':'Not yet visited',pending:'Pending',completed:'Completed','not-scheduled':'Not scheduled',reviewed:'Reviewed',sent:'Awaiting review','not-sent':'Not sent'};
const tabTitles={inperson:'In-person visits',phone:'Phone visits',tbr:'TBRs',reviews:'Google reviews'};

function updateFilterOptions(){
  const sel=document.getElementById('filter');
  sel.innerHTML=filterOptions[currentTab].map(v=>`<option value="${v}">${filterLabels[v]}</option>`).join('');
}

function updateSidebarCounts(){
  const ipOverdue=clients.filter(c=>getIPStatus(c).cls==='overdue').length;
  const phOverdue=clients.filter(c=>getPhoneStatus(c).cls==='overdue').length;
  const tbrPending=clients.filter(c=>['overdue','pending'].includes(getTBRStatus(c).cls)).length;
  const revPending=clients.filter(c=>getReviewStatus(c).cls==='sent').length;
  document.getElementById('cnt-ip').textContent=ipOverdue>0?ipOverdue+'↑':clients.length;
  document.getElementById('cnt-ph').textContent=phOverdue>0?phOverdue+'↑':clients.length;
  document.getElementById('cnt-tbr').textContent=tbrPending>0?tbrPending:'—';
  document.getElementById('cnt-rev').textContent=revPending>0?revPending+'↑':'—';
}

function renderStats(){
  let html='';
  if(currentTab==='inperson'){
    const overdue=clients.filter(c=>getIPStatus(c).cls==='overdue').length;
    const dueSoon=clients.filter(c=>getIPStatus(c).cls==='due-soon').length;
    const onTrack=clients.filter(c=>getIPStatus(c).cls==='on-track').length;
    const notVisited=clients.filter(c=>getIPStatus(c).cls==='not-visited').length;
    html=`<div class="stat-cell"><div class="stat-num num-danger">${overdue}</div><div class="stat-lbl">Overdue</div></div>
          <div class="stat-cell"><div class="stat-num num-warning">${dueSoon}</div><div class="stat-lbl">Due soon</div></div>
          <div class="stat-cell"><div class="stat-num num-success">${onTrack}</div><div class="stat-lbl">On track</div></div>
          <div class="stat-cell"><div class="stat-num">${notVisited}</div><div class="stat-lbl">Not yet visited</div></div>`;
  } else if(currentTab==='reviews'){
    const reviewed=clients.filter(c=>getReviewStatus(c).cls==='reviewed').length;
    const awaiting=clients.filter(c=>getReviewStatus(c).cls==='sent').length;
    const notSent=clients.filter(c=>getReviewStatus(c).cls==='not-sent').length;
    html=`<div class="stat-cell"><div class="stat-num num-success">${reviewed}</div><div class="stat-lbl">Reviewed</div></div>
          <div class="stat-cell"><div class="stat-num num-warning">${awaiting}</div><div class="stat-lbl">Awaiting review</div></div>
          <div class="stat-cell"><div class="stat-num">${notSent}</div><div class="stat-lbl">Not sent</div></div>
          <div class="stat-cell"><div class="stat-num num-info">${clients.length}</div><div class="stat-lbl">Total clients</div></div>`;
  } else if(currentTab==='tbr'){
    const comp=clients.filter(c=>getTBRStatus(c).cls==='completed').length;
    const pend=clients.filter(c=>['pending','overdue'].includes(getTBRStatus(c).cls)).length;
    const ns=clients.filter(c=>getTBRStatus(c).cls==='not-scheduled').length;
    html=`<div class="stat-cell"><div class="stat-num num-success">${comp}</div><div class="stat-lbl">Completed</div></div>
          <div class="stat-cell"><div class="stat-num num-warning">${pend}</div><div class="stat-lbl">Pending / overdue</div></div>
          <div class="stat-cell"><div class="stat-num">${ns}</div><div class="stat-lbl">Not scheduled</div></div>
          <div class="stat-cell"><div class="stat-num num-info">${clients.length}</div><div class="stat-lbl">Total clients</div></div>`;
  }
  document.getElementById('stats-bar').innerHTML=html;
}

function badge(cls,label){return`<span class="badge badge-${cls}">${label}</span>`;}

function render(){
  renderStats();
  updateSidebarCounts();
  const q=document.getElementById('search').value.toLowerCase();
  const f=document.getElementById('filter').value;
  const title=document.getElementById('topbar-title');
  title.innerHTML=`${tabTitles[currentTab]} <span>${clients.length} clients</span>`;

  let rows=clients.filter(c=>{
    if(q&&!c.name.toLowerCase().includes(q)&&!c.city.toLowerCase().includes(q))return false;
    if(f!=='all'){
      let cls='';
      if(currentTab==='inperson')cls=getIPStatus(c).cls;
      else if(currentTab==='phone')cls=getPhoneStatus(c).cls;
      else if(currentTab==='tbr')cls=getTBRStatus(c).cls;
      else cls=getReviewStatus(c).cls;
      if(['not-visited','not-scheduled','not-sent'].includes(f)){if(!['not-visited','not-scheduled','not-sent'].includes(cls))return false;}
      else if(cls!==f)return false;
    }
    return true;
  });

  if(!rows.length){
    document.getElementById('table-wrap').innerHTML='<div class="empty-state"><p>No clients match your search.</p></div>';
    return;
  }

  let html='';
  if(currentTab==='inperson'){
    html=`<table><thead><tr><th>#</th><th>Client</th><th>City</th><th>Last visit</th><th>Next due</th><th>Days until due</th><th>Status</th><th></th></tr></thead><tbody>`;
    rows.forEach((c,i)=>{
      const st=getIPStatus(c);
      const ds=st.days!==null?(st.days<0?`${Math.abs(st.days)} days ago`:`${st.days} days`):'—';
      html+=`<tr><td class="td-num">${i+1}</td><td class="td-name">${c.name}</td><td class="td-city">${c.city}</td><td class="td-date">${fmt(c.lastVisit)}</td><td class="td-date">${st.nextDue?fmt(st.nextDue):'—'}</td><td class="td-days">${ds}</td><td>${badge(st.cls,st.label)}</td><td><button class="edit-btn" onclick="openEdit(${c.id})">edit</button></td></tr>`;
    });
    html+='</tbody></table>';
  } else if(currentTab==='phone'){
    html=`<table><thead><tr><th>#</th><th>Client</th><th>City</th><th>Visit 1 scheduled</th><th>Visit 2 scheduled</th><th>Visit 1 done</th><th>Visit 2 done</th><th>Status</th><th></th></tr></thead><tbody>`;
    rows.forEach((c,i)=>{
      const p=phoneData[c.name]||{};const st=getPhoneStatus(c);
      html+=`<tr><td class="td-num">${i+1}</td><td class="td-name">${c.name}</td><td class="td-city">${c.city}</td><td class="td-date">${fmt(p.ph1)}</td><td class="td-date">${fmt(p.ph2)}</td><td class="td-date">${fmt(p.ph1c)}</td><td class="td-date">${fmt(p.ph2c)}</td><td>${badge(st.cls,st.label)}</td><td><button class="edit-btn" onclick="openEdit(${c.id})">edit</button></td></tr>`;
    });
    html+='</tbody></table>';
  } else if(currentTab==='tbr'){
    html=`<table><thead><tr><th>#</th><th>Client</th><th>City</th><th>Twice/year</th><th>Visit 1 scheduled</th><th>Visit 1 done</th><th>Visit 2 scheduled</th><th>Visit 2 done</th><th>Status</th><th></th></tr></thead><tbody>`;
    rows.forEach((c,i)=>{
      const t=tbrData[c.name]||{};const st=getTBRStatus(c);
      html+=`<tr><td class="td-num">${i+1}</td><td class="td-name">${c.name}</td><td class="td-city">${c.city}</td><td class="td-date">${t.twice||'No'}</td><td class="td-date">${fmt(t.tbr1)}</td><td class="td-date">${fmt(t.tbr1c)}</td><td class="td-date">${fmt(t.tbr2)}</td><td class="td-date">${fmt(t.tbr2c)}</td><td>${badge(st.cls,st.label)}</td><td><button class="edit-btn" onclick="openEdit(${c.id})">edit</button></td></tr>`;
    });
    html+='</tbody></table>';
  } else {
    html=`<table><thead><tr><th>#</th><th>Client</th><th>City</th><th>Email sent</th><th>Person sent to</th><th>Date reviewed</th><th>Reviewer</th><th>Status</th><th></th></tr></thead><tbody>`;
    rows.forEach((c,i)=>{
      const r=reviewData[c.name]||{};const st=getReviewStatus(c);
      html+=`<tr><td class="td-num">${i+1}</td><td class="td-name">${c.name}</td><td class="td-city">${c.city}</td><td class="td-date">${fmt(r.sent)}</td><td>${r.person||'—'}</td><td class="td-date">${fmt(r.reviewed)}</td><td>${r.reviewer||'—'}</td><td>${badge(st.cls,st.label)}</td><td><button class="edit-btn" onclick="openEdit(${c.id})">edit</button></td></tr>`;
    });
    html+='</tbody></table>';
  }
  document.getElementById('table-wrap').innerHTML=html;
}

function switchTab(tab,el){
  currentTab=tab;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  updateFilterOptions();
  render();
}

function openAdd(){
  editingId=null;
  document.getElementById('modal-title').textContent='Add client';
  ['f-name','f-addr','f-city','f-last','f-last2','f-ph1','f-ph2','f-ph1c','f-ph2c','f-tbr1','f-tbr1c','f-tbr2','f-tbr2c','f-rev-sent','f-rev-person','f-rev-date','f-rev-reviewer'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('f-tbr-twice').value='No';
  document.getElementById('modal').classList.add('open');
}

function openEdit(id){
  editingId=id;
  const c=clients.find(x=>x.id===id);
  const p=phoneData[c.name]||{};
  const t=tbrData[c.name]||{};
  const r=reviewData[c.name]||{};
  document.getElementById('modal-title').textContent='Edit — '+c.name;
  document.getElementById('f-name').value=c.name;
  document.getElementById('f-addr').value=c.address;
  document.getElementById('f-city').value=c.city;
  document.getElementById('f-last').value=c.lastVisit||'';
  document.getElementById('f-last2').value=c.lastVisit2||'';
  document.getElementById('f-ph1').value=p.ph1||'';
  document.getElementById('f-ph2').value=p.ph2||'';
  document.getElementById('f-ph1c').value=p.ph1c||'';
  document.getElementById('f-ph2c').value=p.ph2c||'';
  document.getElementById('f-tbr-twice').value=t.twice||'No';
  document.getElementById('f-tbr1').value=t.tbr1||'';
  document.getElementById('f-tbr1c').value=t.tbr1c||'';
  document.getElementById('f-tbr2').value=t.tbr2||'';
  document.getElementById('f-tbr2c').value=t.tbr2c||'';
  document.getElementById('f-rev-sent').value=r.sent||'';
  document.getElementById('f-rev-person').value=r.person||'';
  document.getElementById('f-rev-date').value=r.reviewed||'';
  document.getElementById('f-rev-reviewer').value=r.reviewer||'';
  document.getElementById('modal').classList.add('open');
}

function closeModal(){document.getElementById('modal').classList.remove('open');}

function saveClient(){
  const name=document.getElementById('f-name').value.trim();
  if(!name)return;
  const data={name,address:document.getElementById('f-addr').value.trim(),city:document.getElementById('f-city').value.trim()||'Merced',lastVisit:document.getElementById('f-last').value||null,lastVisit2:document.getElementById('f-last2').value||null};
  phoneData[name]={ph1:document.getElementById('f-ph1').value||null,ph2:document.getElementById('f-ph2').value||null,ph1c:document.getElementById('f-ph1c').value||null,ph2c:document.getElementById('f-ph2c').value||null};
  tbrData[name]={twice:document.getElementById('f-tbr-twice').value,tbr1:document.getElementById('f-tbr1').value||null,tbr1c:document.getElementById('f-tbr1c').value||null,tbr2:document.getElementById('f-tbr2').value||null,tbr2c:document.getElementById('f-tbr2c').value||null};
  reviewData[name]={sent:document.getElementById('f-rev-sent').value||null,person:document.getElementById('f-rev-person').value||null,reviewed:document.getElementById('f-rev-date').value||null,reviewer:document.getElementById('f-rev-reviewer').value||null};
  if(editingId){const i=clients.findIndex(c=>c.id===editingId);clients[i]={...clients[i],...data};}
  else{clients.push({id:nextId++,...data});}
  closeModal();
  render();
}

document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});

// localStorage save & load
function saveData(){
  localStorage.setItem('cvt_clients', JSON.stringify(clients));
  localStorage.setItem('cvt_phone', JSON.stringify(phoneData));
  localStorage.setItem('cvt_tbr', JSON.stringify(tbrData));
  localStorage.setItem('cvt_reviews', JSON.stringify(reviewData));
  localStorage.setItem('cvt_nextId', nextId);
}

function loadData(){
  try {
    const c = localStorage.getItem('cvt_clients');
    const p = localStorage.getItem('cvt_phone');
    const t = localStorage.getItem('cvt_tbr');
    const r = localStorage.getItem('cvt_reviews');
    const n = localStorage.getItem('cvt_nextId');
    if(c) clients = JSON.parse(c);
    if(p) Object.assign(phoneData, JSON.parse(p));
    if(t) Object.assign(tbrData, JSON.parse(t));
    if(r) Object.assign(reviewData, JSON.parse(r));
    if(n) nextId = parseInt(n);
  } catch(e){ console.log('Could not load saved data', e); }
}

const _origSaveClient = saveClient;
saveClient = function(){
  _origSaveClient();
  saveData();
};

loadData();
updateFilterOptions();
render();
</script>
</body>
</html>
